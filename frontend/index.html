<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messenger</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">System</div>
    <div class="auth-title">Messenger<br/>v0.1</div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Войти</button>
      <button class="auth-tab" onclick="switchTab('register')">Регистрация</button>
    </div>

    <div id="login-form">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" id="login-username" type="text" placeholder="your_username" autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" id="login-password" type="password" placeholder="••••••••">
      </div>
      <button class="btn-primary" onclick="login()">Войти →</button>
    </div>

    <div id="register-form" style="display:none">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" id="reg-username" type="text" placeholder="your_username" autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">Phone</label>
        <input class="form-input" id="reg-phone" type="text" placeholder="+7 777 000 00 00">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" id="reg-password" type="password" placeholder="min 8 символов">
      </div>
      <button class="btn-primary" onclick="register()">Создать аккаунт →</button>
    </div>

    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app-screen" style="display:none;">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">MSG//</div>
      <div class="sidebar-actions">
        <button class="icon-btn" title="Новый чат" onclick="openNewChatModal()">+</button>
      </div>
    </div>

    <div class="sidebar-user">
      <div class="user-avatar" id="user-avatar-letter">?</div>
      <div class="user-name" id="user-display-name">...</div>
      <button class="logout-btn" onclick="logout()" title="Выйти">✕</button>
    </div>

    <div class="chats-label">Чаты</div>
    <div class="chats-list" id="chats-list">
      <div class="loading">Загрузка</div>
    </div>
  </div>

  <div class="chat-area">
    <div id="empty-state" style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;">
      <div class="empty-chat">
        <div class="empty-chat-icon">▣</div>
        <div>Выберите чат</div>
        <div style="font-size:9px; margin-top:4px; opacity:0.5">или создайте новый</div>
      </div>
    </div>

    <div id="chat-view" style="display:none; flex-direction:column; height:100vh;">
      <div class="chat-header">
        <div class="chat-header-avatar" id="chat-header-avatar">?</div>
        <div class="chat-header-info">
          <div class="chat-header-name" id="chat-header-name">—</div>
          <div class="chat-header-meta" id="chat-header-meta">—</div>
        </div>
      </div>

      <div class="messages-area" id="messages-area">
        <div class="loading">Загрузка</div>
      </div>

      <div class="input-area">
        <textarea class="message-input" id="message-input" placeholder="Написать сообщение..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>
</div>

<!-- NEW CHAT MODAL -->
<div class="modal-overlay" id="new-chat-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeNewChatModal()">×</button>
    <div class="modal-title">// Новый чат</div>

    <div class="form-group">
      <label class="form-label">Название (необязательно)</label>
      <input class="form-input" id="new-chat-name" type="text" placeholder="Мой чат">
    </div>

    <div class="form-group">
      <label class="form-label">Тип</label>
      <div class="toggle-group">
        <div class="toggle-opt selected" id="toggle-personal" onclick="selectChatType(false)">Личный</div>
        <div class="toggle-opt" id="toggle-group" onclick="selectChatType(true)">Группа</div>
      </div>
    </div>

    <button class="btn-primary" onclick="createChat()">Создать →</button>
    <div class="auth-error" id="chat-error"></div>
  </div>
</div>

<script src="messenger.js"></script>
</body>
</html>
